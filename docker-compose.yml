# Pantheos on the minipc: one app container (Flask API + built frontend at /)
# plus a Postgres container. The app reaches the host's Hermes agent over SSH.
#
#   docker compose up -d          # pulls ghcr.io/shaymanor/pantheos:latest
#   open http://<minipc>:8000/    # frontend at /, API at /api
#
# Real agent mode (DELPHI_ACP_MODE=acp) needs the container to `ssh minipc` into
# the host and run `hermes acp`. That requires: (1) the host can `ssh minipc`
# itself (its own pubkey in ~/.ssh/authorized_keys), and (2) ~/.ssh is mounted
# below. If SSH isn't wired yet, the chat degrades gracefully (an error bubble);
# set DELPHI_ACP_MODE=mock for the deterministic stub instead.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pantheos
      POSTGRES_PASSWORD: pantheos
      POSTGRES_DB: pantheos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # host-local only; the host-networked app connects here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantheos"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  app:
    image: ghcr.io/shaymanor/pantheos:latest
    # build: .   # uncomment to build locally instead of pulling from GHCR
    network_mode: host        # so `ssh minipc` resolves via tailscale and the app serves on :8000
    environment:
      PANTHEOS_DATABASE_URL: postgresql+psycopg://pantheos:pantheos@127.0.0.1:5432/pantheos
      PANTHEOS_ALLOW_RESEED: "0"
      DELPHI_ACP_MODE: acp
      # DELPHI_ACP_CMD default is: ssh minipc "bash -lc 'hermes acp'"
      # Hands the Pantheos MCP tools to Hermes over ACP (the mcp service below).
      PANTHEOS_MCP_URL: http://127.0.0.1:8001/mcp
      # Makes Hermes the source of truth for the connectors panel: the app
      # mirrors ~/.hermes/config.yaml into the DB and pushes UI edits back out,
      # all over this ssh host alias (same channel ACP uses). Unset => panel
      # stays pure-DB. Only the app service gets it (the mcp service must not).
      PANTHEOS_HERMES_SSH: minipc
      # Real telemetry for the Pantheos (gs-platform) container in Monitor: the
      # Caddy access log, mounted read-only below. Absent => Monitor uses the mock.
      CADDY_ACCESS_LOG: /var/log/caddy/access.log
    volumes:
      - ${HOME}/.ssh:/root/.ssh:ro   # key/config to reach the host's hermes over SSH
      - /var/log/caddy:/var/log/caddy:ro   # Caddy access log for the Monitor station
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Real MCP server: exposes Pantheos tickets/monitor/memory + Claude Code to the
  # agent. Host-networked so Hermes on the minipc reaches it at localhost:8001.
  mcp:
    image: ghcr.io/shaymanor/pantheos:latest
    command: ["python", "-m", "app.mcp", "http"]
    network_mode: host
    environment:
      PANTHEOS_DATABASE_URL: postgresql+psycopg://pantheos:pantheos@127.0.0.1:5432/pantheos
      PANTHEOS_MCP_HOST: 0.0.0.0
      PANTHEOS_MCP_PORT: "8001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
