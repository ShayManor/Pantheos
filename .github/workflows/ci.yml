name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest · 100% coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pantheos
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PANTHEOS_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pantheos_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pantheos-api/requirements.txt
      - name: Create test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE pantheos_test;'
      - name: Install dependencies
        run: pip install -r pantheos-api/requirements.txt
      - name: Run tests (coverage gated at 100%)
        working-directory: pantheos-api
        run: python -m pytest

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pantheos
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PANTHEOS_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pantheos
      PANTHEOS_ALLOW_RESEED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pantheos-api/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pantheos/package-lock.json
      - name: Set up backend venv
        working-directory: pantheos-api
        run: |
          python -m venv venv
          venv/bin/pip install -r requirements.txt
      - name: Seed dev database
        working-directory: pantheos-api
        run: venv/bin/python seed_dev.py
      - name: Install frontend dependencies
        working-directory: pantheos
        run: npm ci
      - name: Install Playwright browser
        working-directory: pantheos
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: pantheos
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pantheos/playwright-report
          retention-days: 7
