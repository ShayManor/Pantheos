name: verify-connectors

# E2E credential check for Delphi's external MCP connectors.
# Runs the four secrets against their real services and reports PASS/FAIL.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify connector credentials
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python pantheos-api/scripts/verify_connectors.py
